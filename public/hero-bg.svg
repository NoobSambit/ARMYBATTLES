<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Deep Space/Cyberpunk Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#0B0512" />
      <stop offset="50%" stopColor="#1B063A" />
      <stop offset="100%" stopColor="#0B0512" />
    </linearGradient>

    <!-- Smooth fading Neon Gradients for waves -->
    <linearGradient id="wave-magenta" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stopColor="#E83ED3" stopOpacity="0" />
      <stop offset="50%" stopColor="#E83ED3" stopOpacity="0.8" />
      <stop offset="100%" stopColor="#7C3AED" stopOpacity="0" />
    </linearGradient>
    <linearGradient id="wave-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stopColor="#00F0FF" stopOpacity="0" />
      <stop offset="50%" stopColor="#00F0FF" stopOpacity="0.6" />
      <stop offset="100%" stopColor="#7C3AED" stopOpacity="0" />
    </linearGradient>

    <!-- Master Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-intense" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Digital Grid Pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.02)" strokeWidth="1"/>
    </pattern>
  </defs>

  <!-- Base Layers -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Smooth ambient light blooms -->
  <ellipse cx="720" cy="300" rx="600" ry="200" fill="rgba(124,58,237,0.1)" filter="url(#glow-intense)" pointer-events="none" />
  <ellipse cx="720" cy="300" rx="300" ry="100" fill="rgba(232,62,211,0.05)" filter="url(#glow-intense)" pointer-events="none" />

  <!-- High-fidelity intersecting harmonic waveforms -->
  <path d="M-100,300 C200,80 500,550 720,300 C940,50 1240,520 1540,300" fill="none" stroke="url(#wave-magenta)" stroke-width="3" filter="url(#glow)"/>
  <path d="M-100,300 C300,480 500,120 720,300 C940,480 1140,120 1540,300" fill="none" stroke="url(#wave-cyan)" stroke-width="2.5" filter="url(#glow)"/>
  
  <!-- Subtle data transmission lines -->
  <path d="M0,280 Q360,180 720,300 T1440,320" fill="none" stroke="rgba(124,58,237,0.5)" stroke-width="1" filter="url(#glow)"/>
  <path d="M0,320 Q360,420 720,300 T1440,280" fill="none" stroke="rgba(0,240,255,0.3)" stroke-width="1" filter="url(#glow)"/>

  <!-- Orbital tech rings (Esports Stadium logic) -->
  <g transform="translate(720, 300)">
    <ellipse cx="0" cy="0" rx="550" ry="160" fill="none" stroke="rgba(124,58,237,0.15)" stroke-width="1.5" transform="rotate(-15)"/>
    <ellipse cx="0" cy="0" rx="450" ry="120" fill="none" stroke="rgba(232,62,211,0.2)" stroke-width="1" transform="rotate(18)" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="300" fill="none" stroke="rgba(124,58,237,0.08)" stroke-dasharray="2 10" stroke-width="2"/>
  </g>

  <!-- Depth Particles / Dust -->
  <g filter="url(#glow)">
    <circle cx="150" cy="200" r="2.5" fill="#00F0FF" opacity="0.7"/>
    <circle cx="280" cy="480" r="3" fill="#E83ED3" opacity="0.4"/>
    <circle cx="1150" cy="150" r="2.5" fill="#7C3AED" opacity="0.8"/>
    <circle cx="1300" cy="420" r="2" fill="#00F0FF" opacity="0.5"/>
    <circle cx="950" cy="480" r="3" fill="#E83ED3" opacity="0.3"/>
    <circle cx="600" cy="120" r="3.5" fill="#7C3AED" opacity="0.6"/>
    <circle cx="850" cy="180" r="1.5" fill="#FFFFFF" opacity="0.4"/>
    <circle cx="500" cy="400" r="2" fill="#FFFFFF" opacity="0.2"/>
  </g>
  
  <!-- Edge shading to push focus to exactly where the text is -->
  <rect width="100%" height="100%" fill="none" stroke="#0B0512" stroke-width="40" opacity="0.8" />
  <rect width="100%" height="100%" fill="none" stroke="#0B0512" stroke-width="20" opacity="0.5" />
</svg>
